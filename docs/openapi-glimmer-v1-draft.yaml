openapi: 3.1.0
info:
  title: Glimmer API Draft
  version: 0.1.0
  description: >-
    照见一念前后端联调草案，覆盖会话主链路、心理按摩缓冲链路、
    历史/日记链路和用户域接口。
servers:
  - url: /api/v1
tags:
  - name: Sessions
  - name: Journal
  - name: Users
  - name: Stats
paths:
  /sessions/drafts:
    post:
      tags: [Sessions]
      summary: 创建会话草稿
      operationId: createSessionDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionDraftRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionDraftResponse'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '422':
          $ref: '#/components/responses/RiskBlocked'
  /sessions/{sessionId}/soothing:
    post:
      tags: [Sessions]
      summary: 记录稳定入口行为
      operationId: recordSoothingState
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoothingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoothingResponse'
        '404':
          $ref: '#/components/responses/SessionNotFound'
        '409':
          $ref: '#/components/responses/InvalidSessionState'
  /sessions/{sessionId}/unload:
    post:
      tags: [Sessions]
      summary: 自由倾诉整理为主问题
      operationId: submitUnloadDraft
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnloadRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnloadResponse'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '404':
          $ref: '#/components/responses/SessionNotFound'
        '504':
          $ref: '#/components/responses/AiTimeout'
  /sessions/{sessionId}/context:
    patch:
      tags: [Sessions]
      summary: 更新情绪与模式上下文
      operationId: updateSessionContext
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContextRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateContextResponse'
  /sessions/{sessionId}/generate-answer:
    post:
      tags: [Sessions]
      summary: 生成启发答案和反思卡片
      operationId: generateAnswer
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateAnswerResponse'
        '404':
          $ref: '#/components/responses/SessionNotFound'
        '502':
          $ref: '#/components/responses/InvalidAiPayload'
        '504':
          $ref: '#/components/responses/AiTimeout'
  /sessions/{sessionId}/journal-note:
    patch:
      tags: [Journal]
      summary: 保存一句话情绪日记
      operationId: saveJournalNote
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalNoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalNoteResponse'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /sessions/{sessionId}/followup:
    patch:
      tags: [Journal]
      summary: 保存回访补记
      operationId: saveFollowupNote
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowupResponse'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /sessions:
    get:
      tags: [Journal]
      summary: 查询历史记录与情绪日记时间轴
      operationId: listSessions
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: emotionTag
          in: query
          schema: { type: string }
        - name: actionStatus
          in: query
          schema: { type: string }
        - name: hasFollowup
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
  /users/me:
    get:
      tags: [Users]
      summary: 获取当前用户资料
      operationId: getMyProfile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/settings:
    get:
      tags: [Users]
      summary: 获取用户设置
      operationId: getMySettings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
    patch:
      tags: [Users]
      summary: 更新用户设置
      operationId: updateMySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
  /users/me/journal/weekly-review:
    get:
      tags: [Journal]
      summary: 获取当前用户周度情绪回看
      operationId: getMyWeeklyJournalReview
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReviewResponse'
        '409':
          $ref: '#/components/responses/InsufficientSampleSize'
  /stats/global:
    get:
      tags: [Stats]
      summary: 获取全局统计展示数据
      operationId: getGlobalStats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalStatsResponse'

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    InvalidInput:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    SessionNotFound:
      description: 会话不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidSessionState:
      description: 当前状态不允许执行该操作
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RiskBlocked:
      description: 命中高风险分流
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AiTimeout:
      description: 上游 AI 超时
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidAiPayload:
      description: AI 输出结构不合法
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InsufficientSampleSize:
      description: 历史样本不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
    CreateSessionDraftRequest:
      type: object
      required: [questionText, source]
      properties:
        questionText:
          type: string
        source:
          type: string
          enum: [manual_input, example_chip, history_retry, freeform_unload, voice_transcript]
    CreateSessionDraftResponse:
      type: object
      required: [sessionId, status, question, nextStep]
      properties:
        sessionId: { type: string }
        status: { type: string }
        question:
          type: object
          required: [text, category]
          properties:
            text: { type: string }
            category: { type: string }
        nextStep: { type: string }
    SoothingRequest:
      type: object
      required: [entrySource]
      properties:
        entrySource: { type: string }
        selectedProgram:
          type: string
          enum: [breathing, grounding, pause]
        selectedDurationSeconds:
          type: integer
        completed:
          type: boolean
        skipped:
          type: boolean
    SoothingResponse:
      type: object
      required: [sessionId, status, soothingState]
      properties:
        sessionId: { type: string }
        status: { type: string }
        soothingState:
          $ref: '#/components/schemas/SoothingRequest'
    UnloadRequest:
      type: object
      required: [source, rawText]
      properties:
        source:
          type: string
          enum: [free_text, voice_transcript]
        rawText:
          type: string
    UnloadResponse:
      type: object
      required: [sessionId, status, unloadDraft, nextStep]
      properties:
        sessionId: { type: string }
        status: { type: string }
        nextStep: { type: string }
        unloadDraft:
          type: object
          required: [source, rawText, rawTextLength, refinedQuestionText]
          properties:
            source: { type: string }
            rawText: { type: string }
            rawTextLength: { type: integer }
            refinedQuestionText: { type: string }
            refinementConfidence: { type: number }
    UpdateContextRequest:
      type: object
      properties:
        emotionTag: { type: string }
        insightMode:
          type: string
          enum: [reflective, decisive]
      minProperties: 1
    UpdateContextResponse:
      type: object
      required: [sessionId, status]
      properties:
        sessionId: { type: string }
        status: { type: string }
        emotion:
          type: object
          properties:
            tag: { type: string }
            label: { type: string }
            source: { type: string }
        insightMode:
          type: object
          properties:
            code: { type: string }
            label: { type: string }
    GenerateAnswerResponse:
      type: object
      required: [sessionId, status, answer, cards]
      properties:
        sessionId: { type: string }
        status: { type: string }
        answer:
          type: object
          required: [answerId, answerText, hintText, answerType]
          properties:
            answerId: { type: string }
            answerText: { type: string }
            hintText: { type: string }
            answerType: { type: string }
        cards:
          type: array
          items:
            type: object
            required: [cardId, title, description, question, psychologicalDimension]
            properties:
              cardId: { type: string }
              title: { type: string }
              description: { type: string }
              question: { type: string }
              psychologicalDimension: { type: string }
              isReverseCheck: { type: boolean }
    JournalNoteRequest:
      type: object
      required: [journalNote]
      properties:
        journalNote: { type: string, maxLength: 140 }
        emotionAfterTag: { type: string }
    JournalNoteResponse:
      type: object
      required: [sessionId, journalNote, updatedAt]
      properties:
        sessionId: { type: string }
        journalNote: { type: string }
        emotionAfterTag: { type: string }
        updatedAt: { type: string, format: date-time }
    FollowupRequest:
      type: object
      properties:
        followupNote: { type: string, maxLength: 280 }
        actionStatus:
          type: string
          enum: [pending, adopted, not_started, paused]
      minProperties: 1
    FollowupResponse:
      type: object
      required: [sessionId, updatedAt]
      properties:
        sessionId: { type: string }
        followupNote: { type: string }
        actionStatus: { type: string }
        resumable: { type: boolean }
        updatedAt: { type: string, format: date-time }
    SessionListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            type: object
            required: [sessionId, questionText, createdAt, status, saved]
            properties:
              sessionId: { type: string }
              questionText: { type: string }
              questionCategory: { type: string }
              emotionBeforeTag: { type: string }
              emotionAfterTag: { type: string }
              insightMode: { type: string }
              actionStatus: { type: string }
              journalNote: { type: string }
              followupNote: { type: string }
              resumable: { type: boolean }
              status: { type: string }
              saved: { type: boolean }
              createdAt: { type: string, format: date-time }
        pagination:
          type: object
          required: [page, pageSize, total]
          properties:
            page: { type: integer }
            pageSize: { type: integer }
            total: { type: integer }
    WeeklyReviewResponse:
      type: object
      required: [weekStart, weekEnd, summary, topEmotions, topThemes, unfinishedActions]
      properties:
        weekStart: { type: string, format: date }
        weekEnd: { type: string, format: date }
        summary: { type: string }
        topEmotions:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              ratio: { type: number }
        topThemes:
          type: array
          items:
            type: object
            properties:
              theme: { type: string }
              ratio: { type: number }
        unfinishedActions: { type: integer }
    UserProfileResponse:
      type: object
      description: >-
        对外 API 采用归一化命名；若内部仍使用 avatar_style/avatar_seed，
        由 service adapter 层转换为 avatarUrl 或前端可用头像信息。
      required: [id, totalSessions, savedSessions]
      properties:
        id: { type: string }
        nickname: { type: string }
        avatarUrl: { type: string }
        isSubscriber: { type: boolean }
        totalSessions: { type: integer }
        savedSessions: { type: integer }
    UserSettingsPatchRequest:
      type: object
      properties:
        defaultInsightMode:
          type: string
          enum: [reflective, decisive]
        language:
          type: string
          enum: [zh-CN, en]
        notificationEnabled: { type: boolean }
      minProperties: 1
    UserSettingsResponse:
      type: object
      required: [language, notificationEnabled]
      properties:
        defaultInsightMode: { type: string }
        language: { type: string }
        notificationEnabled: { type: boolean }
    GlobalStatsResponse:
      type: object
      description: >-
        对外展示采用 totalUsersServed / totalSessionsCompleted 口径；
        若内部仍使用 key-value 缓存表，应在 service 层完成聚合与重命名。
      required: [totalUsersServed, totalSessionsCompleted, todayActiveUsers]
      properties:
        totalUsersServed: { type: integer }
        totalSessionsCompleted: { type: integer }
        todayActiveUsers: { type: integer }
        cachedAt: { type: string, format: date-time }